services:
  - type: web
    name: quality-insights-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: quality-insights-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://analysescrap-hutchinson.vercel.app
      - key: BOOTSTRAP_ADMIN_NAME
        value: Responsable
      - key: BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false

databases:
  - name: quality-insights-db
    databaseName: quality_insights
    user: quality_insights
